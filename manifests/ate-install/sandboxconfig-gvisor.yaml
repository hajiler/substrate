# Cluster-wide default SandboxConfig for the gVisor (runsc) sandbox class. A
# WorkerPool with sandboxClass gvisor (the default) and no explicit
# sandboxConfigName resolves to this. atelet fetches the runsc binary matching
# the worker node's architecture. To pin a different runsc, edit the assets
# below or create another SandboxConfig and name it from the WorkerPool.
apiVersion: ate.dev/v1alpha1
kind: SandboxConfig
metadata:
  name: gvisor-default
spec:
  sandboxClass: gvisor
  default: true
  assets:
    amd64:
      runsc:
        url: "gs://gvisor/releases/release/20260608/x86_64/runsc"
        sha256: "4ec073363641a44cc5d171f63f1e23b76016ef632eb3269395c79ac8aecb71bc"
    arm64:
      runsc:
        url: "gs://gvisor/releases/release/20260608/aarch64/runsc"
        sha256: "4bbd0e66f61ae770086e5ca7a47a8385f3e876aa8853e1bc6f7793e4dbd51a0f"
