---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: csidriverconfigs.ate.dev
spec:
  group: ate.dev
  names:
    kind: CSIDriverConfig
    listKind: CSIDriverConfigList
    plural: csidriverconfigs
    shortNames:
    - csidriverconfig
    singular: csidriverconfig
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.driverName
      name: Driver
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: CSIDriverConfig is the Schema for the csidriverconfigs API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: CSIDriverConfigSpec defines the desired state of CSIDriverConfig
            properties:
              controllerEndpoint:
                description: |-
                  ControllerEndpoint is the gRPC endpoint for the CSI Controller service.
                  Must be a valid URI (e.g. unix:///var/run/csi.sock or dns:///csi-service:9000).
                pattern: ^(unix|tcp|dns)://.+$
                type: string
              driverName:
                description: |-
                  DriverName is the standard CSI driver name (e.g. "hostpath.csi.k8s.io").
                  Matches the name in ActorTemplate volume definitions.
                minLength: 1
                type: string
              nodeSocketOverride:
                description: |-
                  NodeSocketOverride is an optional override for the CSI Node service socket
                  on the worker nodes. If empty, ATE defaults to the standard path.
                pattern: ^unix://.+$
                type: string
            required:
            - controllerEndpoint
            - driverName
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources: {}
